# Full local production-alike stack: Postgres + web + worker + Caddy TLS.
#   docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: claimwatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: claimwatch
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimwatch"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://claimwatch:${POSTGRES_PASSWORD:-devpassword}@db:5432/claimwatch
      RUN_SCHEDULER_IN_WEB: "false"     # the worker owns ingest
    depends_on:
      db: {condition: service_healthy}
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app -k uvicorn.workers.UvicornWorker
             -w 2 -b 0.0.0.0:8000 --access-logfile - --error-logfile -"
    expose: ["8000"]
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://claimwatch:${POSTGRES_PASSWORD:-devpassword}@db:5432/claimwatch
    depends_on:
      db: {condition: service_healthy}
      web: {condition: service_started}
    command: python -m app.worker
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on: [web]
    restart: unless-stopped

volumes:
  pgdata:
  caddydata:
  caddyconfig:

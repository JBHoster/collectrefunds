{% extends "base.html" %}
{% block title %}{{ heading }} | {{ site_name }}{% endblock %}
{% block robots %}noindex,nofollow{% endblock %}
{% block body %}
<main class="wrap message-page">
  <p class="eyebrow">{{ eyebrow }}</p>
  <h1>{{ heading }}</h1>
  <p class="lede">{{ body }}</p>
  {% if cta_href %}<p><a class="btn btn-primary" href="{{ cta_href }}">{{ cta_label }}</a></p>{% endif %}
</main>
{% endblock %}
